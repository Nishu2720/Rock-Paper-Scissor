<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A premium Rock Paper Scissors game with modern UI/UX, glassmorphism, and smooth animations.">

<body>
    <div class="app-container">
        <header>
            <h1>Rock Paper Scissors</h1>
        </header>

        <main>
            <div class="choices">
                <div class="choice" id="rock" title="Rock">
                    <img src="rock.png" alt="Rock">
                </div>

                <div class="choice" id="paper" title="Paper">
                    <img src="paper.png" alt="Paper">
                </div>

                <div class="choice" id="scissors" title="Scissors">
                    <img src="scissors.png" alt="Scissors">
                </div>
            </div>

            <div class="score-board">
                <div class="score-card you">
                    <span class="label">You</span>
                    <span id="user-score">0</span>
                </div>
                <div class="score-divider">:</div>
                <div class="score-card comp">
                    <span class="label">Comp</span>
                    <span id="comp-score">0</span>
                </div>
            </div>

            <div class="msg-container">
                <p id="msg">Play your move to start!</p>
            </div>

            <button id="reset-btn">Reset Game</button>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
